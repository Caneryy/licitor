name: Deploy Contracts (Testnet)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: stellar/stellar-cli@v27.0.0
      - name: Configure deployer identity
        env:
          STELLAR_DEPLOYER_SECRET: ${{ secrets.STELLAR_DEPLOYER_SECRET }}
        run: |
          if [[ -z "$STELLAR_DEPLOYER_SECRET" ]]; then
            echo "STELLAR_DEPLOYER_SECRET is required for manual deploy." >&2
            exit 1
          fi
          mkdir -p ~/.config/stellar
          echo "$STELLAR_DEPLOYER_SECRET" > ~/.config/stellar/deployer
          stellar keys add deployer --secret-key "$(cat ~/.config/stellar/deployer)"
      - name: Deploy to testnet
        env:
          STELLAR_SOURCE: deployer
          STELLAR_NETWORK: testnet
        run: ./scripts/deploy-testnet.sh
      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: testnet-deployment
          path: deployments/testnet.json
